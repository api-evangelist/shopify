          application/json:
            schema: {}
            examples:
              example1:
                value:
                  blog:
                    id: 241253187
                    title: IPod Updates
                summary: Update an existing blog title
              example2:
                value:
                  blog:
                    id: 241253187
                    title: IPod Updates
                    handle: ipod-updates
                    commentable: moderate
                summary: Update an existing blog title and handle and also activate comments
              example3:
                value:
                  blog:
                    id: 241253187
                    metafields:
                    - key: new
                      value: newvalue
                      value_type: string
                      namespace: global
                summary: Add a metafield to an existing blog
