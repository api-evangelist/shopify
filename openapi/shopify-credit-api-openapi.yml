openapi: 3.1.0
info:
  title: Shopify Admin REST About Credit API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Credit
paths:
  /admin/api/2020-01/application_credits.json:
    post:
      requestBody:
        content:
          application/json:
            schema: {}
            examples:
              example1:
                value:
                  application_credit:
                    description: application credit for refund
                    amount: 5
                summary: Create a new credit
              example2:
                value:
                  application_credit:
                    description: application credit for refund
                    amount: 5
                    test: true
                summary: Create a test application credit that will not issue a credit to the merchant
              example3:
                value:
                  application_credit:
                    description: application credit for refund
                    amount: 5
                summary: Creating a credit amount that exceeds shop owner purchases over last 30 days will return an error
              example4:
                value:
                  application_credit:
                    description: application credit for refund
                    amount: 5
                summary: Applying a credit to a shop without a previous app purchase will return an error
              example5:
                value:
                  application_credit:
                    description: application credit for refund
                    amount: 5
                summary: Creating a credit amount that exceeds the total pending payouts for the app will return an error
      summary: Shopify Creates An Application Credit
      description: https://shopify.dev/docs/admin-api/rest/reference/billing/applicationcredit#create-2020-01
      parameters: []
      tags:
      - Credit
      responses:
        '200':
          description: ''
      operationId: deprecated_202001_create_application_credits
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
