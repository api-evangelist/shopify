        content:
          application/json:
            schema: {}
            examples:
              example1:
                value:
                  image:
                    id: 850703190
                    position: 2
                    alt: new alt tag content
                summary: Modify an image; change its position and alt tag content
              example2:
                value:
                  image:
                    id: 850703190
                    metafields:
                    - key: my_new_metafield
                      value: my_new_value
                      value_type: string
                      namespace: tags
                summary: Modify an image; add a metafield
              example3:
