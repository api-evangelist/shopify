components:
  schemas:
    Webhook:
      type: object
      description: A webhook subscription
      properties:
        id:
          type: integer
        address:
          type: string
          format: uri
          description: The URL where the webhook delivers data
        topic:
          type: string
          description: The event that triggers the webhook
        format:
          type: string
          description: The data format
          enum:
          - json
          - xml
        fields:
          type: array
          description: Optional list of fields to include in the payload
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        api_version:
          type: string
          description: The API version for the webhook payload
        admin_graphql_api_id:
          type: string
    Error:
      type: object
      description: Error response
      properties:
        errors:
          description: Error details
          oneOf:
          - type: string
          - type: object
            additionalProperties:
              type: array
              items:
                type: string
    WebhookInput:
      type: object
      description: Input for creating or updating a webhook
      required:
      - topic
      - address
      properties:
        topic:
          type: string
          description: The event topic (e.g. orders/create)
        address:
          type: string
          format: uri
          description: The callback URL
        format:
          type: string
          enum:
          - json
          - xml
        fields:
          type: array
          items:
            type: string
  securitySchemes:
    AccessToken:
      type: apiKey
      name: X-Shopify-Access-Token
      in: header
      description: Access token obtained via OAuth
