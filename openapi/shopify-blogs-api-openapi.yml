openapi: 3.1.0
info:
  title: Shopify Admin REST About Blogs API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Blogs
paths:
  /admin/api/2020-01/blogs.json:
    get:
      summary: Shopify Retrieve A List Of All Blogs
      description: https://shopify.dev/docs/admin-api/rest/reference/online-store/blog#index-2020-01
      parameters:
      - in: query
        name: limit
        description: "The maximum number of results to retrieve.\n                  (default: 50, maximum: 250)"
        schema: {}
        required: false
      - in: query
        name: since_id
        description: Restrict results to after the specified ID
        schema: {}
        required: false
      - in: query
        name: handle
        description: Filter by blog handle
        schema: {}
        required: false
      - in: query
        name: fields
        description: comma-separated list of fields to include in the response
        schema: {}
        required: false
      tags:
      - Blogs
      responses:
        '200':
          description: ''
      operationId: deprecated_202001_get_blogs
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
  /admin/api/2020-01/blogs/count.json:
    get:
      summary: Shopify Get A Count Of All Blogs
      description: https://shopify.dev/docs/admin-api/rest/reference/online-store/blog#count-2020-01
      parameters: []
      tags:
      - Blogs
      responses:
        '200':
          description: ''
      operationId: deprecated_202001_get_blogs_count
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
components:
  securitySchemes:
    AccessToken:
      type: apiKey
      name: X-Shopify-Access-Token
      in: header
      description: Access token obtained via OAuth
