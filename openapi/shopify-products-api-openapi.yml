components:
  schemas:
    Product:
      type: object
      description: A Shopify product
      properties:
        id:
          type: integer
          description: Unique numeric identifier for the product
        title:
          type: string
          description: The name of the product
        body_html:
          type: string
          description: Product description in HTML
        vendor:
          type: string
          description: The name of the product vendor
        product_type:
          type: string
          description: A categorization for the product
        handle:
          type: string
          description: URL-friendly version of the product title
        created_at:
          type: string
          format: date-time
          description: When the product was created
        updated_at:
          type: string
          format: date-time
          description: When the product was last updated
        published_at:
          type:
          - string
          - 'null'
          format: date-time
          description: When the product was published (null if unpublished)
        template_suffix:
          type:
          - string
          - 'null'
          description: Liquid template suffix for the product page
        published_scope:
          type: string
          description: Whether the product is published to the POS channel and online store
        tags:
          type: string
          description: Comma-separated list of tags
        status:
          type: string
          description: Product status
          enum:
          - active
          - archived
          - draft
        admin_graphql_api_id:
          type: string
          description: The GraphQL Admin API ID
        variants:
          type: array
          description: Product variants
          items:
            $ref: '#/components/schemas/Variant'
        options:
          type: array
          description: Product options (e.g. Size, Color)
          items:
            $ref: '#/components/schemas/ProductOption'
        images:
          type: array
          description: Product images
          items:
            $ref: '#/components/schemas/Image'
        image:
          description: The primary product image
          $ref: '#/components/schemas/Image'
    ProductInput:
      type: object
      description: Input for creating or updating a product
      properties:
        title:
          type: string
          description: The name of the product
        body_html:
          type: string
          description: Product description in HTML
        vendor:
          type: string
          description: The product vendor
        product_type:
          type: string
          description: A categorization for the product
        tags:
          type: string
          description: Comma-separated list of tags
        status:
          type: string
          enum:
          - active
          - archived
          - draft
        variants:
          type: array
          items:
            $ref: '#/components/schemas/VariantInput'
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageInput'
    StorefrontProduct:
      type: object
      description: A product as returned by the storefront Ajax API
      properties:
        id:
          type: integer
        title:
          type: string
        handle:
          type: string
        description:
          type: string
        published_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        vendor:
          type: string
        type:
          type: string
        tags:
          type: array
          items:
            type: string
        price:
          type: integer
          description: Price in cents
        price_min:
          type: integer
        price_max:
          type: integer
        available:
          type: boolean
        price_varies:
          type: boolean
        compare_at_price:
          type:
          - integer
          - 'null'
        compare_at_price_min:
          type: integer
        compare_at_price_max:
          type: integer
        compare_at_price_varies:
          type: boolean
        variants:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              option1:
                type:
                - string
                - 'null'
              option2:
                type:
                - string
                - 'null'
              option3:
                type:
                - string
                - 'null'
              sku:
                type:
                - string
                - 'null'
              requires_shipping:
                type: boolean
              taxable:
                type: boolean
              featured_image:
                type:
                - object
                - 'null'
              available:
                type: boolean
              name:
                type: string
              public_title:
                type:
                - string
                - 'null'
              price:
                type: integer
              weight:
                type: integer
              compare_at_price:
                type:
                - integer
                - 'null'
              barcode:
                type:
                - string
                - 'null'
        images:
          type: array
          items:
            type: string
            format: uri
        featured_image:
          type: string
          format: uri
        options:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              position:
                type: integer
              values:
                type: array
                items:
                  type: string
        url:
          type: string
        media:
          type: array
          items:
            type: object
            properties:
              alt:
                type:
                - string
                - 'null'
              id:
                type: integer
              position:
                type: integer
              media_type:
                type: string
              src:
                type: string
                format: uri
              width:
                type: integer
              height:
                type: integer
    Image:
      type: object
      description: A product image
      properties:
        id:
          type: integer
        product_id:
          type: integer
        position:
          type: integer
          description: Position in the image list
        alt:
          type:
          - string
          - 'null'
          description: Alt text for the image
        width:
          type: integer
        height:
          type: integer
        src:
          type: string
          format: uri
          description: The image URL
        variant_ids:
          type: array
          description: Variant IDs associated with this image
          items:
            type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        admin_graphql_api_id:
          type: string
    VariantInput:
      type: object
      description: Input for creating or updating a variant
      properties:
        title:
          type: string
        price:
          type: string
        sku:
          type: string
        position:
          type: integer
        inventory_policy:
          type: string
          enum:
          - deny
          - continue
        compare_at_price:
          type: string
        option1:
          type: string
        option2:
          type: string
        option3:
          type: string
        taxable:
          type: boolean
        barcode:
          type: string
        grams:
          type: integer
        weight:
          type: number
        weight_unit:
          type: string
          enum:
          - g
          - kg
          - oz
          - lb
        inventory_quantity:
          type: integer
        requires_shipping:
          type: boolean
    ImageInput:
      type: object
      description: Input for creating or updating a product image
      properties:
        src:
          type: string
          format: uri
          description: URL of the image
        attachment:
          type: string
          description: Base64-encoded image data
        alt:
          type: string
          description: Alt text
        position:
          type: integer
        variant_ids:
          type: array
          items:
            type: integer
    Variant:
      type: object
      description: A product variant
      properties:
        id:
          type: integer
          description: Unique numeric identifier
        product_id:
          type: integer
          description: The ID of the parent product
        title:
          type: string
          description: The variant title
        price:
          type: string
          description: The price of the variant
        sku:
          type:
          - string
          - 'null'
          description: Stock keeping unit
        position:
          type: integer
          description: Position of the variant in the list
        inventory_policy:
          type: string
          description: Whether to allow selling when out of stock
          enum:
          - deny
          - continue
        compare_at_price:
          type:
          - string
          - 'null'
          description: Original price for comparison
        fulfillment_service:
          type: string
          description: The fulfillment service for the variant
        inventory_management:
          type:
          - string
          - 'null'
          description: The inventory tracking service
        option1:
          type:
          - string
          - 'null'
          description: Option 1 value
        option2:
          type:
          - string
          - 'null'
          description: Option 2 value
        option3:
          type:
          - string
          - 'null'
          description: Option 3 value
        taxable:
          type: boolean
          description: Whether the variant is taxable
        barcode:
          type:
          - string
          - 'null'
          description: Barcode, UPC, or ISBN
        grams:
          type: integer
          description: Weight in grams
        weight:
          type: number
          description: Weight in the specified unit
        weight_unit:
          type: string
          description: Weight unit
          enum:
          - g
          - kg
          - oz
          - lb
        inventory_item_id:
          type: integer
          description: The inventory item ID
        inventory_quantity:
          type: integer
          description: Tracked inventory quantity
        requires_shipping:
          type: boolean
          description: Whether the variant requires shipping
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        image_id:
          type:
          - integer
          - 'null'
          description: The ID of the associated image
        admin_graphql_api_id:
          type: string
    ProductOption:
      type: object
      description: A product option (e.g. Size, Color)
      properties:
        id:
          type: integer
        product_id:
          type: integer
        name:
          type: string
          description: The option name
        position:
          type: integer
          description: Position in the options list
        values:
          type: array
          description: Available values for this option
          items:
            type: string
    Error:
      type: object
      description: Error response
      properties:
        errors:
          description: Error details
          oneOf:
          - type: string
          - type: object
            additionalProperties:
              type: array
              items:
                type: string
  parameters:
    ProductId:
      name: product_id
      in: path
      required: true
      description: The ID of the product
      schema:
        type: integer
  securitySchemes:
    AccessToken:
      type: apiKey
      name: X-Shopify-Access-Token
      in: header
      description: Access token obtained via OAuth
