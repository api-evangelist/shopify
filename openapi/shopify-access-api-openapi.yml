openapi: 3.1.0
info:
  title: Shopify Admin REST About Access API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Access
  description: Manage access scopes and tokens
paths:
  /admin/oauth/access_scopes.json:
    get:
      operationId: listAccessScopes
      summary: Shopify Retrieve access scopes for the access token
      description: Retrieves a list of access scopes associated with the current access token.
      tags:
      - Access
      responses:
        '200':
          description: A list of access scopes
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_scopes:
                    type: array
                    items:
                      type: object
                      properties:
                        handle:
                          type: string
                          description: The scope handle
  /admin/api/2020-01/storefront_access_tokens.json:
    post:
      requestBody:
        content:
          application/json:
            schema: {}
            examples:
              example1:
                value:
                  storefront_access_token:
                    title: Test
                summary: Create a new storefront access token
              example2:
                value:
                  storefront_access_token:
                    title: Test
                summary: Generating a token for an app that lacks required unauthenticated scopes fails
              example3:
                value:
                  storefront_access_token:
                    title: Token
                summary: Creating a token after exceeding the limit fails
      summary: Shopify Creates A New Storefront Access Token
      description: https://shopify.dev/docs/admin-api/rest/reference/access/storefrontaccesstoken#create-2020-01
      parameters: []
      tags:
      - Access
      responses:
        '200':
          description: ''
      operationId: deprecated_202001_create_storefront_access_tokens
