openapi: 3.1.0
info:
  title: Shopify Admin REST About Numbers API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Numbers
paths:
  /fetch_tracking_numbers:
    get:
      summary: Shopify Get Tracking Numbers For Orders
      description: https://shopify.dev/docs/admin-api/rest/reference/shipping-and-fulfillment/fulfillmentservice#fetch-tracking-numbers
      parameters:
      - in: query
        name: order_names
        description: 'The fulfillment names we require tracking numbers for (i.e. #1001.1)'
        schema: {}
        required: false
      - in: query
        name: shop
        description: The shop's myshopify url
        schema: {}
        required: false
      tags:
      - Numbers
      responses:
        '200':
          description: ''
      operationId: deprecated_unknown_version_get_fetch_tracking_numbers
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
components:
  securitySchemes:
    AccessToken:
      type: apiKey
      name: X-Shopify-Access-Token
      in: header
      description: Access token obtained via OAuth
