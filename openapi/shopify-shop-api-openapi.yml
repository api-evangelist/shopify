components:
  schemas:
    Shop:
      type: object
      description: Shop configuration and metadata
      properties:
        id:
          type: integer
        name:
          type: string
          description: The name of the shop
        email:
          type: string
          format: email
        domain:
          type: string
          description: Primary domain
        myshopify_domain:
          type: string
          description: The .myshopify.com domain
        shop_owner:
          type: string
        phone:
          type:
          - string
          - 'null'
        address1:
          type: string
        address2:
          type:
          - string
          - 'null'
        city:
          type: string
        province:
          type: string
        province_code:
          type: string
        country:
          type: string
        country_code:
          type: string
        country_name:
          type: string
        zip:
          type: string
        currency:
          type: string
          description: Three-letter ISO 4217 currency code
        money_format:
          type: string
        timezone:
          type: string
        iana_timezone:
          type: string
        plan_name:
          type: string
        plan_display_name:
          type: string
        weight_unit:
          type: string
        primary_locale:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        admin_graphql_api_id:
          type: string
  securitySchemes:
    AccessToken:
      type: apiKey
      name: X-Shopify-Access-Token
      in: header
      description: Access token obtained via OAuth
