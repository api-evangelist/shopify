components:
  schemas:
    TaxLine:
      type: object
      description: A tax line applied to an item
      properties:
        title:
          type: string
        price:
          type: string
        rate:
          type: number
    ShippingLine:
      type: object
      description: A shipping method applied to an order
      properties:
        id:
          type: integer
        title:
          type: string
        price:
          type: string
        code:
          type:
          - string
          - 'null'
        source:
          type: string
        discounted_price:
          type: string
        tax_lines:
          type: array
          items:
            $ref: '#/components/schemas/TaxLine'
    Fulfillment:
      type: object
      description: A fulfillment of an order
      properties:
        id:
          type: integer
        order_id:
          type: integer
        status:
          type: string
          enum:
          - pending
          - open
          - success
          - cancelled
          - error
          - failure
        tracking_company:
          type:
          - string
          - 'null'
        tracking_number:
          type:
          - string
          - 'null'
        tracking_numbers:
          type: array
          items:
            type: string
        tracking_url:
          type:
          - string
          - 'null'
        tracking_urls:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        admin_graphql_api_id:
          type: string
    Address:
      type: object
      description: A customer mailing address
      properties:
        id:
          type: integer
        customer_id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        company:
          type:
          - string
          - 'null'
        address1:
          type: string
        address2:
          type:
          - string
          - 'null'
        city:
          type: string
        province:
          type:
          - string
          - 'null'
        country:
          type: string
        zip:
          type: string
        phone:
          type:
          - string
          - 'null'
        province_code:
          type:
          - string
          - 'null'
        country_code:
          type: string
        country_name:
          type: string
        default:
          type: boolean
          description: Whether this is the default address
    Customer:
      type: object
      description: A Shopify customer
      properties:
        id:
          type: integer
          description: Unique numeric identifier
        email:
          type:
          - string
          - 'null'
          format: email
          description: Customer email address
        first_name:
          type:
          - string
          - 'null'
          description: First name
        last_name:
          type:
          - string
          - 'null'
          description: Last name
        phone:
          type:
          - string
          - 'null'
          description: Phone number in E.164 format
        orders_count:
          type: integer
          description: Number of orders placed
        total_spent:
          type: string
          description: Total amount spent
        state:
          type: string
          description: Account state
          enum:
          - disabled
          - invited
          - enabled
          - declined
        note:
          type:
          - string
          - 'null'
          description: A note about the customer
        verified_email:
          type: boolean
          description: Whether the email has been verified
        tax_exempt:
          type: boolean
          description: Whether the customer is tax exempt
        tags:
          type: string
          description: Comma-separated list of tags
        currency:
          type: string
          description: Three-letter ISO 4217 currency code
        accepts_marketing:
          type: boolean
          description: Whether the customer has consented to marketing
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
