openapi: 3.1.0
info:
  title: Shopify Admin REST About Customers API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Customers
  description: Manage customer records
paths:
  /customers.json:
    get:
      operationId: listCustomers
      summary: Shopify Retrieve a list of customers
      description: Retrieves a list of customers. Results can be filtered by creation date, update date, and other criteria. Returns up to 250 customers.
      tags:
      - Customers
      parameters:
      - name: ids
        in: query
        description: Comma-separated list of customer IDs
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of results (max 250, default 50)
        schema:
          type: integer
          default: 50
          maximum: 250
      - name: since_id
        in: query
        description: Return customers after the specified ID
        schema:
          type: integer
      - name: created_at_min
        in: query
        description: Show customers created after this date
        schema:
          type: string
          format: date-time
      - name: created_at_max
        in: query
        description: Show customers created before this date
        schema:
          type: string
          format: date-time
      - name: updated_at_min
        in: query
        description: Show customers updated after this date
        schema:
          type: string
          format: date-time
      - name: updated_at_max
        in: query
        description: Show customers updated before this date
        schema:
          type: string
          format: date-time
      - name: fields
        in: query
        description: Comma-separated list of fields to include
        schema:
          type: string
      responses:
        '200':
          description: A list of customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  customers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
    post:
      operationId: createCustomer
      summary: Shopify Create a customer
      description: Creates a new customer record. Sends a welcome email if send_email_welcome is true.
      tags:
      - Customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - customer
              properties:
                customer:
                  $ref: '#/components/schemas/CustomerInput'
      responses:
        '201':
          description: The created customer
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/Customer'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /customers/count.json:
    get:
      operationId: getCustomerCount
      summary: Shopify Retrieve a count of customers
      description: Retrieves a count of all customers.
      tags:
      - Customers
      responses:
        '200':
          description: The customer count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
  /customers/search.json:
    get:
      operationId: searchCustomers
      summary: Shopify Search for customers
      description: Searches for customers matching a supplied query. Supports searching by name, email, phone, and other fields.
      tags:
      - Customers
      parameters:
      - name: query
        in: query
        required: true
        description: Search query (e.g. email:user@example.com)
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of results (max 250, default 50)
        schema:
          type: integer
          default: 50
          maximum: 250
      - name: fields
        in: query
        description: Comma-separated list of fields to include
        schema:
          type: string
      responses:
        '200':
          description: Matching customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  customers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
  /customers/{customer_id}.json:
    get:
      operationId: getCustomer
      summary: Shopify Retrieve a single customer
      description: Retrieves a single customer by ID.
      tags:
      - Customers
      parameters:
      - $ref: '#/components/parameters/CustomerId'
      - name: fields
        in: query
        description: Comma-separated list of fields to include
        schema:
          type: string
      responses:
        '200':
          description: The requested customer
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found
    put:
      operationId: updateCustomer
      summary: Shopify Update a customer
      description: Updates an existing customer record.
      tags:
      - Customers
      parameters:
      - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - customer
              properties:
                customer:
                  $ref: '#/components/schemas/CustomerInput'
      responses:
        '200':
          description: The updated customer
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/Customer'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /customers/{customer_id}/orders.json:
    get:
      operationId: listCustomerOrders
      summary: Shopify Retrieve orders for a customer
      description: Retrieves all orders belonging to a specific customer.
      tags:
      - Customers
      parameters:
      - $ref: '#/components/parameters/CustomerId'
      - name: status
        in: query
        description: Filter by order status
        schema:
          type: string
          enum:
          - open
          - closed
          - cancelled
          - any
      responses:
        '200':
          description: A list of orders for the customer
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
