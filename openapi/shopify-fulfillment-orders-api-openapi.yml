openapi: 3.1.0
info:
  title: Shopify Admin REST About Fulfillment Orders API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Fulfillment Orders
  description: Manage fulfillment workflows
paths:
  /orders/{order_id}/fulfillment_orders.json:
    get:
      operationId: listOrderFulfillmentOrders
      summary: Shopify Retrieve fulfillment orders for an order
      description: Retrieves all fulfillment orders associated with a given order.
      tags:
      - Fulfillment Orders
      parameters:
      - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: A list of fulfillment orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  fulfillment_orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/FulfillmentOrder'
components:
  schemas:
    FulfillmentOrder:
      type: object
      description: A fulfillment order representing items to be fulfilled together
      properties:
        id:
          type: integer
        order_id:
          type: integer
        status:
          type: string
          enum:
          - open
          - in_progress
          - cancelled
          - incomplete
          - closed
          - scheduled
          - on_hold
        assigned_location_id:
          type: integer
        request_status:
          type: string
        line_items:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              shop_id:
                type: integer
              fulfillment_order_id:
                type: integer
              quantity:
                type: integer
              line_item_id:
                type: integer
              inventory_item_id:
                type: integer
              fulfillable_quantity:
                type: integer
              variant_id:
                type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
  parameters:
    OrderId:
      name: order_id
      in: path
      required: true
      description: The ID of the order
      schema:
        type: integer
  securitySchemes:
    AccessToken:
      type: apiKey
      name: X-Shopify-Access-Token
      in: header
      description: Access token obtained via OAuth
