openapi: 3.1.0
info:
  title: Shopify Admin REST About Charge API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Charge
paths:
  /admin/api/2020-01/application_charges.json:
    post:
      requestBody:
        content:
          application/json:
            schema: {}
            examples:
              example1:
                value:
                  application_charge:
                    name: Super Duper Expensive action
                    price: 100
                    return_url: http://super-duper.shopifyapps.com
                summary: Create an application charge
              example2:
                value:
                  application_charge:
                    name: Super Duper Expensive action
                    price: 100
                    return_url: http://super-duper.shopifyapps.com
                    test: true
                summary: Create a test charge that will not cause a credit card to be charged
              example3:
                value:
                  application_charge:
                    name: Super Duper Expensive action
                    price: 0.4
                    return_url: http://super-duper.shopifyapps.com
                summary: Trying to create a charge with a price less than 0.50 will return an error
              example4:
                value:
                  application_charge:
                    name: ''
                summary: Trying to create a charge without a price or name will return an error
      summary: Shopify Creates An Application Charge
      description: https://shopify.dev/docs/admin-api/rest/reference/billing/applicationcharge#create-2020-01
      parameters: []
      tags:
      - Charge
      responses:
        '200':
