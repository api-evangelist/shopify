        description: metafield[owner_resource]
        required: false
      tags:
      - Resource
      responses:
        '200':
          description: ''
      operationId: deprecated_202001_get_metafields
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
    post:
      requestBody:
        content:
          application/json:
            schema: {}
            examples:
              example1:
                value:
                  metafield:
                    namespace: inventory
                    key: warehouse
                    value: 25
                    value_type: integer
                summary: Create a new metafield for a Shop resource
              example2:
                value:
                  metafield:
                    namespace: inventory
                    key: warehouse
                    value: 25
                    value_type: integer
                summary: Create a new metafield for a Product resource
              example3:
                value:
                  metafield:
                    key: null
                summary: Creating a metafield without a key will fail and return an error
      summary: Shopify Creates A New Metafield For A Resource
      description: https://shopify.dev/docs/admin-api/rest/reference/metafield#create-2020-01
      parameters: []
      tags:
