openapi: 3.1.0
info:
  title: Shopify Admin REST API
  description: >-
    The Shopify Admin REST API lets you build apps and integrations that extend
    and enhance the Shopify admin. Access products, customers, orders, inventory,
    fulfillment, and more. Endpoints are organized by resource type and versioned
    by release date.
  version: '2025-01'
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
  - url: https://{store}.myshopify.com/admin/api/2025-01
    description: Shopify Admin REST API
    variables:
      store:
        default: my-store
        description: The Shopify store subdomain
security:
  - AccessToken: []
tags:
  - name: Access
    description: Manage access scopes and tokens
  - name: Collections
    description: Retrieve collection data
  - name: Custom Collections
    description: Manage manual collections
  - name: Customer Addresses
    description: Manage customer addresses
  - name: Customers
    description: Manage customer records
  - name: Fulfillment Orders
    description: Manage fulfillment workflows
  - name: Fulfillments
    description: Manage order fulfillments
  - name: Inventory Items
    description: Manage inventory item records
  - name: Inventory Levels
    description: Manage inventory quantities at locations
  - name: Locations
    description: Retrieve store locations
  - name: Orders
    description: Manage orders
  - name: Product Images
    description: Manage images associated with products
  - name: Product Variants
    description: Manage product variants
  - name: Products
    description: Manage products in a Shopify store
  - name: Shop
    description: Retrieve shop configuration
  - name: Smart Collections
    description: Manage automated collections
  - name: Webhooks
    description: Manage webhook subscriptions
paths:
  /products.json:
    get:
      operationId: listProducts
      summary: Shopify Retrieve a list of products
      description: >-
        Retrieves a list of products. Results can be filtered by collection,
        product type, vendor, creation date, update date, publication status,
        and other criteria. Returns up to 250 products per page.
      tags:
        - Products
      parameters:
        - name: ids
          in: query
          description: Comma-separated list of product IDs to retrieve
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of results to return (max 250, default 50)
          schema:
            type: integer
            default: 50
            maximum: 250
        - name: since_id
          in: query
          description: Return products after the specified ID
          schema:
            type: integer
        - name: title
          in: query
          description: Filter by product title
          schema:
            type: string
        - name: vendor
          in: query
          description: Filter by product vendor
          schema:
            type: string
        - name: product_type
          in: query
          description: Filter by product type
          schema:
            type: string
        - name: collection_id
          in: query
          description: Filter by collection ID
          schema:
            type: integer
        - name: status
          in: query
          description: Filter by product status
          schema:
            type: string
            enum:
              - active
              - archived
              - draft
        - name: fields
          in: query
          description: Comma-separated list of fields to include in the response
          schema:
            type: string
        - name: created_at_min
          in: query
          description: Show products created after this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: created_at_max
          in: query
          description: Show products created before this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: updated_at_min
          in: query
          description: Show products updated after this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: updated_at_max
          in: query
          description: Show products updated before this date (ISO 8601)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
    post:
      operationId: createProduct
      summary: Shopify Create a new product
      description: >-
        Creates a new product. You can include product variants and images in
        the same request. If no variants are specified a default variant is
        created automatically.
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product
              properties:
                product:
                  $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: The created product
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:
                    $ref: '#/components/schemas/Product'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /products/count.json:
    get:
      operationId: getProductCount
      summary: Shopify Retrieve a count of products
      description: >-
        Retrieves a count of products matching the specified criteria.
      tags:
        - Products
      parameters:
        - name: vendor
          in: query
          description: Filter by product vendor
          schema:
            type: string
        - name: product_type
          in: query
          description: Filter by product type
          schema:
            type: string
        - name: collection_id
          in: query
          description: Filter by collection ID
          schema:
            type: integer
        - name: created_at_min
          in: query
          description: Count products created after this date
          schema:
            type: string
            format: date-time
        - name: updated_at_min
          in: query
          description: Count products updated after this date
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: The product count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
  /products/{product_id}.json:
    get:
      operationId: getProduct
      summary: Shopify Retrieve a single product
      description: >-
        Retrieves a single product by its ID, including variants, images,
        and options.
      tags:
        - Products
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          schema:
            type: string
      responses:
        '200':
          description: The requested product
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:
                    $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
    put:
      operationId: updateProduct
      summary: Shopify Update a product
      description: >-
        Updates an existing product and any of its variants and images.
      tags:
        - Products
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product
              properties:
                product:
                  $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: The updated product
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:
                    $ref: '#/components/schemas/Product'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteProduct
      summary: Shopify Delete a product
      description: >-
        Deletes a product and all associated variants and images.
      tags:
        - Products
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product deleted successfully
        '404':
          description: Product not found
  /products/{product_id}/images.json:
    get:
      operationId: listProductImages
      summary: Shopify Retrieve a list of product images
      description: >-
        Retrieves all images for a given product.
      tags:
        - Product Images
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - name: since_id
          in: query
          description: Return images after the specified ID
          schema:
            type: integer
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          schema:
            type: string
      responses:
        '200':
          description: A list of product images
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      $ref: '#/components/schemas/Image'
    post:
      operationId: createProductImage
      summary: Shopify Create a product image
      description: >-
        Creates a new image for a product. Images can be provided as a URL
        or a base64-encoded attachment.
      tags:
        - Product Images
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  $ref: '#/components/schemas/ImageInput'
      responses:
        '201':
          description: The created image
          content:
            application/json:
              schema:
                type: object
                properties:
                  image:
                    $ref: '#/components/schemas/Image'
  /products/{product_id}/images/count.json:
    get:
      operationId: getProductImageCount
      summary: Shopify Retrieve a count of product images
      description: >-
        Retrieves a count of images for a given product.
      tags:
        - Product Images
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: The image count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
  /products/{product_id}/images/{image_id}.json:
    get:
      operationId: getProductImage
      summary: Shopify Retrieve a single product image
      description: >-
        Retrieves a single image for a product by its ID.
      tags:
        - Product Images
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/ImageId'
      responses:
        '200':
          description: The requested image
          content:
            application/json:
              schema:
                type: object
                properties:
                  image:
                    $ref: '#/components/schemas/Image'
    put:
      operationId: updateProductImage
      summary: Shopify Update a product image
      description: >-
        Updates an existing product image. Can update position, alt text,
        and variant associations.
      tags:
        - Product Images
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/ImageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  $ref: '#/components/schemas/ImageInput'
      responses:
        '200':
          description: The updated image
          content:
            application/json:
              schema:
                type: object
                properties:
                  image:
                    $ref: '#/components/schemas/Image'
    delete:
      operationId: deleteProductImage
      summary: Shopify Delete a product image
      description: >-
        Deletes an image from a product.
      tags:
        - Product Images
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/ImageId'
      responses:
        '200':
          description: Image deleted successfully
  /products/{product_id}/variants.json:
    get:
      operationId: listProductVariants
      summary: Shopify Retrieve a list of product variants
      description: >-
        Retrieves all variants for a given product.
      tags:
        - Product Variants
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - name: limit
          in: query
          description: Maximum number of results (max 250, default 50)
          schema:
            type: integer
            default: 50
            maximum: 250
        - name: since_id
          in: query
          description: Return variants after the specified ID
          schema:
            type: integer
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          schema:
            type: string
      responses:
        '200':
          description: A list of product variants
          content:
            application/json:
              schema:
                type: object
                properties:
                  variants:
                    type: array
                    items:
                      $ref: '#/components/schemas/Variant'
    post:
      operationId: createProductVariant
      summary: Shopify Create a product variant
      description: >-
        Creates a new variant for a product.
      tags:
        - Product Variants
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - variant
              properties:
                variant:
                  $ref: '#/components/schemas/VariantInput'
      responses:
        '201':
          description: The created variant
          content:
            application/json:
              schema:
                type: object
                properties:
                  variant:
                    $ref: '#/components/schemas/Variant'
  /customers.json:
    get:
      operationId: listCustomers
      summary: Shopify Retrieve a list of customers
      description: >-
        Retrieves a list of customers. Results can be filtered by creation
        date, update date, and other criteria. Returns up to 250 customers.
      tags:
        - Customers
      parameters:
        - name: ids
          in: query
          description: Comma-separated list of customer IDs
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of results (max 250, default 50)
          schema:
            type: integer
            default: 50
            maximum: 250
        - name: since_id
          in: query
          description: Return customers after the specified ID
          schema:
            type: integer
        - name: created_at_min
          in: query
          description: Show customers created after this date
          schema:
            type: string
            format: date-time
        - name: created_at_max
          in: query
          description: Show customers created before this date
          schema:
            type: string
            format: date-time
        - name: updated_at_min
          in: query
          description: Show customers updated after this date
          schema:
            type: string
            format: date-time
        - name: updated_at_max
          in: query
          description: Show customers updated before this date
          schema:
            type: string
            format: date-time
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          schema:
            type: string
      responses:
        '200':
          description: A list of customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  customers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
    post:
      operationId: createCustomer
      summary: Shopify Create a customer
      description: >-
        Creates a new customer record. Sends a welcome email if
        send_email_welcome is true.
      tags:
        - Customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customer
              properties:
                customer:
                  $ref: '#/components/schemas/CustomerInput'
      responses:
        '201':
          description: The created customer
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/Customer'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /customers/count.json:
    get:
      operationId: getCustomerCount
      summary: Shopify Retrieve a count of customers
      description: Retrieves a count of all customers.
      tags:
        - Customers
      responses:
        '200':
          description: The customer count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
  /customers/search.json:
    get:
      operationId: searchCustomers
      summary: Shopify Search for customers
      description: >-
        Searches for customers matching a supplied query. Supports searching
        by name, email, phone, and other fields.
      tags:
        - Customers
      parameters:
        - name: query
          in: query
          required: true
          description: Search query (e.g. email:user@example.com)
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of results (max 250, default 50)
          schema:
            type: integer
            default: 50
            maximum: 250
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          schema:
            type: string
      responses:
        '200':
          description: Matching customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  customers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
  /customers/{customer_id}.json:
    get:
      operationId: getCustomer
      summary: Shopify Retrieve a single customer
      description: Retrieves a single customer by ID.
      tags:
        - Customers
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          schema:
            type: string
      responses:
        '200':
          description: The requested customer
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found
    put:
      operationId: updateCustomer
      summary: Shopify Update a customer
      description: Updates an existing customer record.
      tags:
        - Customers
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customer
              properties:
                customer:
                  $ref: '#/components/schemas/CustomerInput'
      responses:
        '200':
          description: The updated customer
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/Customer'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /customers/{customer_id}/orders.json:
    get:
      operationId: listCustomerOrders
      summary: Shopify Retrieve orders for a customer
      description: Retrieves all orders belonging to a specific customer.
      tags:
        - Customers
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - name: status
          in: query
          description: Filter by order status
          schema:
            type: string
            enum:
              - open
              - closed
              - cancelled
              - any
      responses:
        '200':
          description: A list of orders for the customer
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
  /customers/{customer_id}/addresses.json:
    get:
      operationId: listCustomerAddresses
      summary: Shopify Retrieve addresses for a customer
      description: Retrieves all addresses for a customer.
      tags:
        - Customer Addresses
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - name: limit
          in: query
          description: Maximum number of results (max 250, default 50)
          schema:
            type: integer
            default: 50
            maximum: 250
      responses:
        '200':
          description: A list of customer addresses
          content:
            application/json:
              schema:
                type: object
                properties:
                  addresses:
                    type: array
                    items:
                      $ref: '#/components/schemas/Address'
    post:
      operationId: createCustomerAddress
      summary: Shopify Create a customer address
      description: Creates a new address for a customer.
      tags:
        - Customer Addresses
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - address
              properties:
                address:
                  $ref: '#/components/schemas/Address'
      responses:
        '201':
          description: The created address
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer_address:
                    $ref: '#/components/schemas/Address'
  /orders.json:
    get:
      operationId: listOrders
      summary: Shopify Retrieve a list of orders
      description: >-
        Retrieves a list of orders. By default only orders from the last 60
        days are returned. Use status=any to include all statuses.
      tags:
        - Orders
      parameters:
        - name: ids
          in: query
          description: Comma-separated list of order IDs
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of results (max 250, default 50)
          schema:
            type: integer
            default: 50
            maximum: 250
        - name: since_id
          in: query
          description: Return orders after the specified ID
          schema:
            type: integer
        - name: status
          in: query
          description: Filter by order status
          schema:
            type: string
            enum:
              - open
              - closed
              - cancelled
              - any
            default: open
        - name: financial_status
          in: query
          description: Filter by financial status
          schema:
            type: string
            enum:
              - authorized
              - pending
              - paid
              - partially_paid
              - refunded
              - voided
              - partially_refunded
              - any
              - unpaid
        - name: fulfillment_status
          in: query
          description: Filter by fulfillment status
          schema:
            type: string
            enum:
              - shipped
              - partial
              - unshipped
              - any
              - unfulfilled
        - name: created_at_min
          in: query
          description: Show orders created after this date
          schema:
            type: string
            format: date-time
        - name: created_at_max
          in: query
          description: Show orders created before this date
          schema:
            type: string
            format: date-time
        - name: updated_at_min
          in: query
          description: Show orders updated after this date
          schema:
            type: string
            format: date-time
        - name: updated_at_max
          in: query
          description: Show orders updated before this date
          schema:
            type: string
            format: date-time
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          schema:
            type: string
      responses:
        '200':
          description: A list of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
    post:
      operationId: createOrder
      summary: Shopify Create an order
      description: >-
        Creates an order. Orders created via the API do not trigger payment
        processing. Use the order to represent sales from external channels.
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - order
              properties:
                order:
                  $ref: '#/components/schemas/OrderInput'
      responses:
        '201':
          description: The created order
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /orders/count.json:
    get:
      operationId: getOrderCount
      summary: Shopify Retrieve a count of orders
      description: Retrieves a count of orders matching the given criteria.
      tags:
        - Orders
      parameters:
        - name: status
          in: query
          description: Filter by order status
          schema:
            type: string
            enum:
              - open
              - closed
              - cancelled
              - any
        - name: financial_status
          in: query
          description: Filter by financial status
          schema:
            type: string
        - name: fulfillment_status
          in: query
          description: Filter by fulfillment status
          schema:
            type: string
        - name: created_at_min
          in: query
          description: Count orders created after this date
          schema:
            type: string
            format: date-time
        - name: updated_at_min
          in: query
          description: Count orders updated after this date
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: The order count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
  /orders/{order_id}.json:
    get:
      operationId: getOrder
      summary: Shopify Retrieve a single order
      description: Retrieves a single order by ID including line items and details.
      tags:
        - Orders
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          schema:
            type: string
      responses:
        '200':
          description: The requested order
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
    put:
      operationId: updateOrder
      summary: Shopify Update an order
      description: >-
        Updates an existing order. Note, tags, email, phone, shipping address,
        and metafields can be updated.
      tags:
        - Orders
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
