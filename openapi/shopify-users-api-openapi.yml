openapi: 3.1.0
info:
  title: Shopify Admin REST About Users API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Users
paths:
  /admin/api/2020-01/users.json:
    get:
      summary: Shopify Retrieves A List Of All Users
      description: https://shopify.dev/docs/admin-api/rest/reference/plus/user#index-2020-01
      parameters:
      - in: query
        name: limit
        description: "The maximum number of results to show on a page.\n                  (default: 50, maximum: 250)"
        schema: {}
        required: false
      - in: query
        name: page_info
        description: A unique ID used to access a certain page of results.
        schema: {}
        required: false
      tags:
      - Users
      responses:
        '200':
          description: ''
      operationId: deprecated_202001_get_users
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
