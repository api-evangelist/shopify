openapi: 3.1.0
info:
  title: Shopify Admin REST About Releases API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Releases
paths:
  /admin/api/unstable/fulfillment_orders/release_hold.json:
    post:
      requestBody:
        content:
          application/json:
            schema: {}
            examples:
              example1:
                value:
                  order_id: 450789469
                summary: Release the holds on the fulfillment orders for a specific order
      summary: Shopify Releases The Fulfillment Order Holds For A Specific Order
      description: https://shopify.dev/docs/admin-api/rest/reference/shipping-and-fulfillment/fulfillmentorder#release_hold-unstable
      parameters:
      - in: query
        name: order_id
        description: The ID of the order that is associated to the fulfillment orders.
        schema: {}
        required: false
      tags:
      - Releases
      responses:
        '200':
          description: ''
      operationId: deprecated_unstable_create_fulfillment_orders_release_hold
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
components:
  securitySchemes:
    AccessToken:
      type: apiKey
      name: X-Shopify-Access-Token
      in: header
      description: Access token obtained via OAuth
