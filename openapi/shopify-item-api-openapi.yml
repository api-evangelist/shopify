      responses:
        '200':
          description: ''
      operationId: deprecated_202001_get_inventory_items_param_inventory_item_id
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
    put:
      requestBody:
        content:
          application/json:
            schema: {}
            examples:
              example1:
                value:
                  inventory_item:
                    id: 808950810
