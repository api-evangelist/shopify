openapi: 3.1.0
info:
  title: Shopify Admin REST About Time API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Time
paths:
  /admin/api/2021-01/fulfillment_orders/{fulfillment_order_id}/reschedule.json:
    post:
      requestBody:
        content:
          application/json:
            schema: {}
            examples:
              example1:
                value:
                  fulfillment_order:
                    new_fulfill_at: '2021-12-05'
                summary: Update the fulfill_at time of a scheduled fulfillment order
      summary: Shopify Updates The Fulfill_at Time Of A Scheduled Fulfillment Order
      description: https://shopify.dev/docs/admin-api/rest/reference/shipping-and-fulfillment/fulfillmentorder#reschedule-2021-01
      parameters:
      - in: path
        name: fulfillment_order_id
        required: true
        schema:
          type: string
        description: fulfillment_order_id
      tags:
      - Time
      responses:
        '200':
          description: ''
      operationId: deprecated_202101_create_fulfillment_orders_param_fulfillment_order_id_reschedule
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
  /admin/api/unstable/fulfillment_orders/{fulfillment_order_id}/reschedule.json:
    post:
      requestBody:
        content:
          application/json:
            schema: {}
            examples:
              example1:
                value:
                  fulfillment_order:
                    new_fulfill_at: '2021-12-05'
                summary: Update the fulfill_at time of a scheduled fulfillment order
      summary: Shopify Updates The Fulfill_at Time Of A Scheduled Fulfillment Order
      description: https://shopify.dev/docs/admin-api/rest/reference/shipping-and-fulfillment/fulfillmentorder#reschedule-unstable
      parameters:
      - in: path
        name: fulfillment_order_id
        required: true
        schema:
          type: string
        description: fulfillment_order_id
      tags:
      - Time
      responses:
        '200':
          description: ''
      operationId: deprecated_unstable_create_fulfillment_orders_param_fulfillment_order_id_reschedule
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
  /admin/api/2020-01/shopify_payments/disputes.json:
    get:
      summary: Shopify Retrieve All Disputes Ordered By Initiated_at Date And Time (iso 8601 Format)
      description: https://shopify.dev/docs/admin-api/rest/reference/shopify_payments/dispute#index-2020-01
      parameters:
      - in: query
        name: since_id
        description: Return only disputes after the specified ID.
        schema: {}
        required: false
      - in: query
        name: last_id
        description: Return only disputes before the specified ID.
        schema: {}
        required: false
      - in: query
        name: status
        description: Return only disputes with the specified status.
        schema: {}
        required: false
      - in: query
        name: initiated_at
        description: Return only disputes with the specified initiated_at date (ISO 8601 format).
        schema: {}
        required: false
      tags:
      - Time
      responses:
        '200':
          description: ''
      operationId: deprecated_202001_get_shopify_payments_disputes
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
  /admin/api/2020-04/shopify_payments/disputes.json:
    get:
      summary: Shopify Retrieve All Disputes Ordered By Initiated_at Date And Time (iso 8601 Format)
      description: https://shopify.dev/docs/admin-api/rest/reference/shopify_payments/dispute#index-2020-04
      parameters:
      - in: query
        name: since_id
        description: Return only disputes after the specified ID.
        schema: {}
        required: false
      - in: query
        name: last_id
        description: Return only disputes before the specified ID.
        schema: {}
        required: false
      - in: query
        name: status
        description: Return only disputes with the specified status.
        schema: {}
        required: false
      - in: query
        name: initiated_at
        description: Return only disputes with the specified initiated_at date (ISO 8601 format).
        schema: {}
        required: false
      tags:
      - Time
      responses:
        '200':
          description: ''
      operationId: deprecated_202004_get_shopify_payments_disputes
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
components:
  securitySchemes:
    AccessToken:
      type: apiKey
      name: X-Shopify-Access-Token
      in: header
      description: Access token obtained via OAuth
