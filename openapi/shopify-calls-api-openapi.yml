openapi: 3.1.0
info:
  title: Shopify Admin REST About Calls API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Calls
paths:
  /admin/api/2021-01/deprecated_api_calls.json:
    get:
      summary: Shopify Retrieves A List Of Deprecated Api Calls Made By The Authenticated Private App In The Past 30 Days
      description: https://shopify.dev/docs/admin-api/rest/reference/deprecated_api_calls#index-2021-01
      parameters: []
      tags:
      - Calls
      responses:
        '200':
          description: ''
      operationId: deprecated_202101_get_deprecated_api_calls
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
  /admin/api/unstable/deprecated_api_calls.json:
    get:
      summary: Shopify Retrieves A List Of Deprecated Api Calls Made By The Authenticated Private App In The Past 30 Days
      description: https://shopify.dev/docs/admin-api/rest/reference/deprecated_api_calls#index-unstable
      parameters: []
      tags:
      - Calls
      responses:
        '200':
          description: ''
      operationId: deprecated_unstable_get_deprecated_api_calls
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
components:
  securitySchemes:
    AccessToken:
      type: apiKey
      name: X-Shopify-Access-Token
      in: header
      description: Access token obtained via OAuth
