openapi: 3.1.0
info:
  title: Shopify Admin REST About Checkouts API
  description: The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin. Access products, customers, orders, inventory, fulfillment, and more. Endpoints are organized by resource type and versioned by release date.
  version: 2025-01
  contact:
    name: Shopify
    url: https://shopify.dev/docs/api/admin-rest
    email: api@shopify.com
  license:
    name: Shopify API Terms
    url: https://www.shopify.com/legal/api-terms
  x-date: '2026-03-04'
servers:
- url: https://{store}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API
  variables:
    store:
      default: my-store
      description: The Shopify store subdomain
security:
- AccessToken: []
tags:
- name: Checkouts
paths:
  /admin/api/2020-01/checkouts/count.json:
    get:
      summary: Shopify Retrieves A Count Of Checkouts From The Past 90 Days
      description: https://shopify.dev/docs/admin-api/rest/reference/orders/abandoned-checkouts#count-2020-01
      parameters:
      - in: query
        name: since_id
        description: Restrict results to after the specified ID.
        schema: {}
        required: false
      - in: query
        name: created_at_min
        description: 'Count checkouts created after the specified date. (format: 2014-04-25T16:15:47-04:00)'
        schema: {}
        required: false
      - in: query
        name: created_at_max
        description: 'Count checkouts created before the specified date. (format: 2014-04-25T16:15:47-04:00)'
        schema: {}
        required: false
      - in: query
        name: updated_at_min
        description: 'Count checkouts last updated after the specified date. (format: 2014-04-25T16:15:47-04:00)'
        schema: {}
        required: false
      - in: query
        name: updated_at_max
        description: 'Count checkouts last updated before the specified date. (format: 2014-04-25T16:15:47-04:00)'
        schema: {}
        required: false
      - in: query
        name: status
        description: "Count checkouts with a given status.\n                  (default: open)\n                    \n                        open: Count only open abandoned checkouts.\n                        closed: Count only closed abandoned checkouts."
        schema: {}
        required: false
      tags:
      - Checkouts
      responses:
        '200':
          description: ''
      operationId: deprecated_202001_get_checkouts_count
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        ChooseTags: true
