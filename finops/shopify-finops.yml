billingModel:
  pricingCategory: Subscription + Take Rate
  billingFrequency: Monthly
  billingCurrency: USD
focusColumns:
  ServiceName: Shopify
  ServiceCategory: E-Commerce Platform
  ProviderName: Shopify
  PublisherName: Shopify Inc.
  BillingCurrency: USD
meters:
  - name: subscription_months
    unit: month
    aggregation: sum
    dimensions:
      - plan
  - name: card_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - card_present
      - currency
  - name: transaction_volume
    unit: USD
    aggregation: sum
  - name: third_party_gateway_volume
    unit: USD
    aggregation: sum
  - name: shopify_shipping
    unit: label
    aggregation: sum
principles:
  - name: Visibility
    description: Pull payouts and Orders API daily; reconcile Shopify Payments fees against ledger.
  - name: Allocation
    description: Tag orders with channel/source for per-channel margin reporting.
  - name: Optimization
    description: Upgrade to Advanced/Plus when third-party gateway fees outweigh subscription delta.
  - name: Accountability
    description: Review monthly fee report; renegotiate gateway rates above $1M GMV.
