naftiko: 1.0.0-alpha2
info:
  label: Shopify  API — Scopes
  description: 'Shopify  API — Scopes. 1 operations. Lead operation: Shopify Retrieves A List Of Access Scopes Associated
    To The Access Token. Self-contained Naftiko capability covering one Shopify business surface.'
  tags:
  - Shopify
  - Scopes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SHOPIFY_API_KEY: SHOPIFY_API_KEY
capability:
  consumes:
  - type: http
    namespace: shopify-scopes
    baseUri: ''
    description: Shopify  API — Scopes business capability. Self-contained, no shared references.
    resources:
    - name: admin-oauth-access_scopes.json
      path: /admin/oauth/access_scopes.json
      operations:
      - name: getadminoauthaccessscopes
        method: GET
        description: Shopify Retrieves A List Of Access Scopes Associated To The Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: shopify-scopes-rest
    port: 8080
    description: REST adapter for Shopify  API — Scopes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin/oauth/access-scopes-json
      name: admin-oauth-access-scopes-json
      description: REST surface for admin-oauth-access_scopes.json.
      operations:
      - method: GET
        name: getadminoauthaccessscopes
        description: Shopify Retrieves A List Of Access Scopes Associated To The Access Token
        call: shopify-scopes.getadminoauthaccessscopes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: shopify-scopes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Shopify  API — Scopes. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: shopify-retrieves-list-access-scopes
      description: Shopify Retrieves A List Of Access Scopes Associated To The Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: shopify-scopes.getadminoauthaccessscopes
      outputParameters:
      - type: object
        mapping: $.
