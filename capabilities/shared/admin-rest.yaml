naftiko: "1.0.0-alpha1"

info:
  label: "Shopify Admin REST API"
  description: "Shopify Admin REST API for managing products, customers, orders, inventory, and fulfillments"
  tags:
    - Commerce
    - Admin
    - Ecommerce
    - REST
    - Retail
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SHOPIFY_ACCESS_TOKEN: SHOPIFY_ACCESS_TOKEN
      SHOPIFY_STORE: SHOPIFY_STORE

capability:
  consumes:
    - type: http
      namespace: shopify-admin
      baseUri: "https://{{SHOPIFY_STORE}}.myshopify.com/admin/api/2025-01"
      description: "Shopify Admin REST API"
      authentication:
        type: apikey
        key: X-Shopify-Access-Token
        value: "{{SHOPIFY_ACCESS_TOKEN}}"
        placement: header
      resources:
        - name: products
          path: /products.json
          description: "Manage store products"
          operations:
            - name: list-products
              method: GET
              description: "List products with optional filters"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results per page (max 250)"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status (active, draft, archived)"
                - name: vendor
                  in: query
                  type: string
                  required: false
                  description: "Filter by vendor"
                - name: product_type
                  in: query
                  type: string
                  required: false
                  description: "Filter by product type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-product
              method: POST
              description: "Create a new product"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  product:
                    title: "{{tools.title}}"
                    vendor: "{{tools.vendor}}"
                    product_type: "{{tools.product_type}}"
                    status: "{{tools.status}}"

        - name: orders
          path: /orders.json
          description: "Manage orders"
          operations:
            - name: list-orders
              method: GET
              description: "List orders with status filter"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status (open, closed, cancelled, any)"
                - name: financial_status
                  in: query
                  type: string
                  required: false
                  description: "Filter by financial status"
                - name: fulfillment_status
                  in: query
                  type: string
                  required: false
                  description: "Filter by fulfillment status"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results per page"
                - name: created_at_min
                  in: query
                  type: string
                  required: false
                  description: "Filter orders created after date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-order
              method: POST
              description: "Create a new order"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  order:
                    email: "{{tools.email}}"
                    line_items: "{{tools.line_items}}"

        - name: customers
          path: /customers.json
          description: "Manage customers"
          operations:
            - name: list-customers
              method: GET
              description: "List customers"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results per page"
                - name: email
                  in: query
                  type: string
                  required: false
                  description: "Filter by email address"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-customer
              method: POST
              description: "Create a new customer"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  customer:
                    first_name: "{{tools.first_name}}"
                    last_name: "{{tools.last_name}}"
                    email: "{{tools.email}}"

        - name: collections
          path: /custom_collections.json
          description: "Manage custom product collections"
          operations:
            - name: list-collections
              method: GET
              description: "List custom collections"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: inventory-levels
          path: /inventory_levels.json
          description: "Manage inventory levels"
          operations:
            - name: list-inventory-levels
              method: GET
              description: "List inventory levels"
              inputParameters:
                - name: inventory_item_ids
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated inventory item IDs"
                - name: location_ids
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated location IDs"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: adjust-inventory
              method: POST
              description: "Adjust inventory level"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  location_id: "{{tools.location_id}}"
                  inventory_item_id: "{{tools.inventory_item_id}}"
                  available_adjustment: "{{tools.adjustment}}"

        - name: fulfillments
          path: /orders/{order_id}/fulfillments.json
          description: "Manage order fulfillments"
          operations:
            - name: list-fulfillments
              method: GET
              description: "List fulfillments for an order"
              inputParameters:
                - name: order_id
                  in: path
                  type: integer
                  required: true
                  description: "Order ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-fulfillment
              method: POST
              description: "Fulfill an order"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  fulfillment:
                    location_id: "{{tools.location_id}}"
                    tracking_number: "{{tools.tracking_number}}"
                    tracking_company: "{{tools.tracking_company}}"
                    notify_customer: "{{tools.notify_customer}}"

        - name: webhooks
          path: /webhooks.json
          description: "Manage webhook subscriptions"
          operations:
            - name: list-webhooks
              method: GET
              description: "List webhook subscriptions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-webhook
              method: POST
              description: "Create a webhook subscription"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  webhook:
                    topic: "{{tools.topic}}"
                    address: "{{tools.address}}"
                    format: "{{tools.format}}"

  exposes:
    - type: rest
      port: 8100
      namespace: shopify-admin-rest
      resources:
        - path: /v1/products
          name: products
          description: "Manage store products"
          operations:
            - method: GET
              name: list-products
              description: "List products"
              call: "shopify-admin.list-products"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-product
              description: "Create product"
              call: "shopify-admin.create-product"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/orders
          name: orders
          description: "Manage orders"
          operations:
            - method: GET
              name: list-orders
              description: "List orders"
              call: "shopify-admin.list-orders"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers
          name: customers
          description: "Manage customers"
          operations:
            - method: GET
              name: list-customers
              description: "List customers"
              call: "shopify-admin.list-customers"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: shopify-admin-mcp
      transport: http
      tools:
        - name: list-products
          description: "List Shopify store products with optional filters"
          hints:
            readOnly: true
          call: "shopify-admin.list-products"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-product
          description: "Create a new product in the Shopify store"
          hints:
            readOnly: false
          call: "shopify-admin.create-product"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-orders
          description: "List Shopify orders with status filters"
          hints:
            readOnly: true
          call: "shopify-admin.list-orders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-customers
          description: "List Shopify customers"
          hints:
            readOnly: true
          call: "shopify-admin.list-customers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-inventory-levels
          description: "List inventory levels across locations"
          hints:
            readOnly: true
          call: "shopify-admin.list-inventory-levels"
          outputParameters:
            - type: object
              mapping: "$."
        - name: adjust-inventory
          description: "Adjust inventory quantity at a location"
          hints:
            readOnly: false
          call: "shopify-admin.adjust-inventory"
          outputParameters:
            - type: object
              mapping: "$."
