naftiko: 1.0.0-alpha2
info:
  label: Shopify Multipass API — Multipass
  description: 'Shopify Multipass API — Multipass. 1 operations. Lead operation: Shopify Log in a customer using a Multipass
    token. Self-contained Naftiko capability covering one Shopify business surface.'
  tags:
  - Shopify
  - Multipass
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SHOPIFY_API_KEY: SHOPIFY_API_KEY
capability:
  consumes:
  - type: http
    namespace: multipass-multipass
    baseUri: https://{store}.myshopify.com
    description: Shopify Multipass API — Multipass business capability. Self-contained, no shared references.
    resources:
    - name: account-login-multipass-token
      path: /account/login/multipass/{token}
      operations:
      - name: multipasslogin
        method: GET
        description: Shopify Log in a customer using a Multipass token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: path
          type: string
          description: The encrypted and signed Multipass token. Generated by encrypting a JSON payload containing at minimum
            an email address, then Base64 URL-encoding the result.
          required: true
  exposes:
  - type: rest
    namespace: multipass-multipass-rest
    port: 8080
    description: REST adapter for Shopify Multipass API — Multipass. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/account/login/multipass/{token}
      name: account-login-multipass-token
      description: REST surface for account-login-multipass-token.
      operations:
      - method: GET
        name: multipasslogin
        description: Shopify Log in a customer using a Multipass token
        call: multipass-multipass.multipasslogin
        with:
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: multipass-multipass-mcp
    port: 9090
    transport: http
    description: MCP adapter for Shopify Multipass API — Multipass. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: shopify-log-customer-using-multipass
      description: Shopify Log in a customer using a Multipass token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: multipass-multipass.multipasslogin
      with:
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
