      outputParameters:
      - type: object
        mapping: $.
    - name: shopify-update-order
      description: Shopify Update an order
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-rest-orders.updateorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: shopify-delete-order
      description: Shopify Delete an order
      hints:
        readOnly: false
